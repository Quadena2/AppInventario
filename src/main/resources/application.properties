spring.application.name=inventario
server.port=${PORT:8080}
server.address=0.0.0.0

# 1. Configuracion a prueba de balas para Railway y Local
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5123}/${PGDATABASE:inventariodb}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.graphql.graphiql.enabled=true